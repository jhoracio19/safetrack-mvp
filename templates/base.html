<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeTrack - MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
    <nav class="border-b border-slate-200 bg-white">
        <div class="mx-auto flex max-w-6xl flex-col gap-3 px-4 py-4 sm:flex-row sm:items-center sm:justify-between">
            <a href="{% url 'landing' %}" class="text-xl font-bold tracking-tight text-slate-950">SafeTrack</a>
            <div class="flex flex-wrap gap-2 text-sm font-medium">
                <a href="{% url 'landing' %}" class="rounded-lg px-3 py-2 text-slate-700 hover:bg-slate-100">Precios</a>
                <a href="{% url 'admin_dashboard' 'premium' %}" class="rounded-lg px-3 py-2 text-slate-700 hover:bg-slate-100">Admin</a>
                <a href="{% url 'employee_view' %}" class="rounded-lg px-3 py-2 text-slate-700 hover:bg-slate-100">Empleado</a>
                <a href="{% url 'employee_courses' %}" class="rounded-lg px-3 py-2 text-slate-700 hover:bg-slate-100">Cursos</a>
                <a href="{% url 'employee_tasks' %}" class="rounded-lg px-3 py-2 text-slate-700 hover:bg-slate-100">Tareas</a>
                <a href="{% url 'pest_providers' %}" class="rounded-lg px-3 py-2 text-slate-700 hover:bg-slate-100">Fumigadores</a>
                <a href="{% url 'customer_view' %}" class="rounded-lg bg-slate-900 px-3 py-2 text-white hover:bg-slate-800">Cliente</a>
            </div>
        </div>
    </nav>

    <main class="mx-auto max-w-6xl px-4 py-8">
        {% block content %}
        {% endblock content %}
    </main>

</body>
</html>
